<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MineLatino | Editores</title>

    <style>
        body {
            margin: 0;
            background: #0a0a0a;
            font-family: Arial, sans-serif;
            color: #fff;
        }

        /* HEADER */
        header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(180deg, #111 0%, #0a0a0a 100%);
            border-bottom: 2px solid #222;
        }

        header img {
            height: 120px;
            filter: drop-shadow(0px 0px 12px #ffae00);
        }

        header h1 {
            margin-top: 20px;
            font-size: 36px;
            font-weight: 700;
            color: #ffae00;
            text-shadow: 0px 0px 10px #ffae00;
        }

        /* GRID */
        .container {
            max-width: 1100px;
            margin: 50px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 30px;
        }

        /* CARDS */
        .card {
            background: #161616;
            padding: 25px;
            border-radius: 12px;
            border: 2px solid #2a2a2a;
            text-decoration: none;
            color: #fff;
            transition: 0.25s;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.4);
        }

        .card:hover {
            transform: translateY(-6px);
            border-color: #ffae00;
            background: #1f1f1f;
            box-shadow: 0px 0px 15px #ffae00;
        }

        .card h2 {
            margin: 0 0 10px;
            font-size: 22px;
            color: #ffae00;
        }

        .card p {
            margin: 0;
            color: #ccc;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <header>
        <img src="ML_logo.png" alt="MineLatino Logo">
        <h1>MineLatino | Editores</h1>
    </header>

    <div class="container">

        <a class="card" href="trmenu_editor.html">
            <h2>TRMenu Editor</h2>
            <p>Editor de menús</p>
        </a>

        <a class="card" href="deluxetags_editor.html">
            <h2>DeluxeTags Editor</h2>
            <p>Editor de tags</p>
        </a>

        <a class="card" href="mmoitems_editor.html">
            <h2>MMOItems Editor</h2>
            <p>Editor de items</p>
        </a>

        <a class="card" href="mines_calculator.html">
            <h2>Mines Calculator</h2>
            <p>Calculadora de minas</p>
        </a>

    </div>

</body>
</html>
