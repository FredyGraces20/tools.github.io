<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MineLatino | Editores</title>
    <style>
        body {
            margin: 0;
            background: #0b0b0b;
            font-family: Arial, sans-serif;
            color: #fff;
        }

        header {
            background: #111;
            padding: 20px 40px;
            display: flex;
            align-items: center;
            gap: 20px;
            border-bottom: 2px solid #222;
        }

        header img {
            height: 70px;
        }

        header h1 {
            font-size: 32px;
            margin: 0;
            font-weight: 700;
        }

        .container {
            max-width: 1100px;
            margin: 50px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 30px;
        }

        .card {
            background: #161616;
            padding: 25px;
            border-radius: 12px;
            border: 2px solid #2a2a2a;
            text-decoration: none;
            color: #fff;
            transition: 0.25s;
        }

        .card:hover {
            transform: translateY(-6px);
            border-color: #ffaa00;
            background: #1f1f1f;
        }

        .card h2 {
            margin: 0 0 10px;
            font-size: 22px;
            color: #ffaa00;
        }

        .card p {
            margin: 0;
            color: #ccc;
            font-size: 14px;
        }
    </style>
</head>
